            <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="1" seed="0" result="noise" />
            <feGaussianBlur in="noise" stdDeviation="30" result="smoothNoise" />
            <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="120" xChannelSelector="R" yChannelSelector="G" />

    <!-- App Script -->
    <script src="app.js"></script>

    <!-- Copy to Clipboard Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const copyBtn = document.getElementById('copy-email-btn');
            const emailText = document.getElementById('email-text');
            
            if(copyBtn && emailText) {
                copyBtn.addEventListener('click', () => {
                    const textToCopy = "voronkintim@gmail.com";
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const originalText = emailText.innerText;
                        emailText.innerText = "Email copied!";
                        copyBtn.style.color = "#BCF600";
                        copyBtn.style.borderColor = "#BCF600";
                        copyBtn.style.background = "rgba(255, 255, 255, 0.08)";
                        
                        // Track the email copy custom event in GoatCounter
                        if (window.goatcounter && window.goatcounter.count) {
                            window.goatcounter.count({
                                path:  'action-copy-email',
                                title: 'Copied Email Address',
                                event: true
                            });
                        }

                        setTimeout(() => {
                            emailText.innerText = "voronkintim@gmail.com";
                            copyBtn.style.color = "";
                            copyBtn.style.borderColor = "";
                            copyBtn.style.background = "";
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy!', err);
                    });
                });
            }

            // Profile Link Copy
            const profilePic = document.getElementById('profile-pic-container');
            const profileTooltip = document.getElementById('profile-tooltip');
            
            if (profilePic && profileTooltip) {
                profilePic.addEventListener('click', () => {
                    const textToCopy = "https://timvoronkin.github.io/";
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        profileTooltip.classList.remove('opacity-0');
                        
                        // Track the profile link copy custom event in GoatCounter
                        if (window.goatcounter && window.goatcounter.count) {
                            window.goatcounter.count({
                                path:  'action-copy-profile',
                                title: 'Copied Profile Link',
                                event: true
                            });
                        }

                        setTimeout(() => {
                            profileTooltip.classList.add('opacity-0');
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy profile link!', err);
                    });
                });
            }
        });
    </script>
